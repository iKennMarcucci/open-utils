definitions:
  Estado:
    title: Estado
    description: Estado en que se entrega dicho wallet
    properties:
      estado:
        type: string
        description: Estado de consulta del wallet
  Celular:
    title: Celular
    description: Numero del celular a consultar en base de datos si existe algun wallet registrado con ese numero de celular
    properties:
      celular:
        type: string
        description: Numero de celular del cliente
  Usuario:
    title: Usuario
    description: Datos de personales del usuario para realizar el registro y posterior el uso de la aplicación transfiya.
    properties:
      tipoIdentificacion:
        type: string
        description: Tipo de identificacion del cliente.
      numeroIdentificacion:
        type: string
        description: Numero de identificacion del usuario.
      nombres:
        type: string
        description: Primer y segundo nombre del cliente.
      apellidos:
        type: string
        description: Primer y segundo apellido del cliente.
      celular:
        type: string
        description: Numero de celular del usuario (Debe iniciar por 573, debe contener 12 caracteres)
        pattern: '^\d{12}$'
      email:
        type: string
        description: Correo electronico del cliente.
      cuentas:
        type: array
        description: Numero de cuenta del cliente
        items: {
          type: string
        }
      descripcion:
        type: string
        description: descripcion para el uso de los datos..
      dispositivo:
        $ref: '#/definitions/Dispositivo'
    required:
      - tipoIdentificacion
      - numeroIdentificacion
      - nombres
      - apellidos
      - celular
      - cuenta
      - email
  DatosUsuario:
    title: DatosUsuario
    description: Datos que se requieren para solicitar algun dinero por medio de transfiya
    properties:
      tokenCuenta:
        type: string
        description: numero de cuenta donde se acreditara la solicitud.
      celular:
        type: string
        description: numero telefonico al cual se le solicita el dinero.
      celularUsuario:
        type: string
        description: Numero de telefono del usuario logeado en la aplicación encriptado.
      monto:
        type: string
        description: Dinero que solicitara por medio de transfiya
      descripcion:
        type: string
        description: Espacio para la descripcion de porque se hace la solicitud
      dispositivo:
        $ref: '#/definitions/Dispositivo'
  Solicitar:
    title: Solicitar
    description: Datos a entregar para finalizar la transaccion
    properties:
      numeroTransaccion:
        type: string
        description: Numero dela tranferencia realizada
      valorSolicitado:
        type: string
        description: Dinero que se solicito
      celular:
        type: string
        description: Numero de telefono al que se solicito
      fechaTransaccion:
        type: string
        pattern: dd/MM/aaaa
        description: Fecha de la operación.
      horaTransaccion:
        type: string
        pattern: HH:mm:ss
        description: Hora de la operación.
      cus:
        type: string
        description: Identificador unico de la transacción ante ACH
  CuentaUsuario:
    title: Cuenta
    description: Datos que se requieren para la actualización del signer por defecto
    properties:
      numeroCuenta:
        type: string
        description: Numero de cuenta que se desea actualizar como signer por defecto.
      celular:
        type: string
        description: Numero de telefono encriptado.
  SignerResponse:
    title: UpdateSignerDefault
    description: Datos para indicar la correcta actualización
    properties:
      numTx:
        type: string
        description: Numero de transaccion realizada
      created:
        type: string
        description: Fecha de la operación.
  SignerDefault:
    title: SignerDefault
    description: Datos que se mostraran al front para identificar que hay un signer default registrado
    properties:
      default:
        type: string
        description: Numero de cuenta que se encuentra por defecto
      error:
        type: string
        description: Numero de error al cual se le adjudica la respuesta
      mensaje:
        type: string
        description: Mensaje de identificacion del error
  RegisterKeyResponse:
    title: RegisterKeyResponse
    description: Datos para indicar el correcto registro de llave
    properties:
      id:
        type: string
        description: Indicador unico
      date:
        type: string
        description: Fecha de la operación.
      hour:
        type: string
        description: Hora de la operación.
  Credito:
    title: Credito
    properties:
      nroReferenciaTransaccion:
        type: string
        description: Numero de referencia de la transaccion
      nombreReferenciaTransaccion:
        type: string
        description: Nombre y apellido de la persona que envia dinero
      monto:
        type: string
        description: Ingresos del cliente.
      celular:
        type: string
        description: Numero de celular del que le estan haciendo el envio
      descripcion:
        type: string
        description: Concepto por el cual se realizo el envio
      fecha:
        type: string
        description: Fecha de la transaccion
  Solicitud:
    title: Solicitud
    properties:
      nombreReferenciaTransaccion:
        type: string
        description: Numero de referencia de la transaccion
      nroReferenciaTransaccion:
        type: string
        description: Numero de referencia de la transaccion
      monto:
        type: string
        description: Ingresos del cliente.
      celular:
        type: string
        description: Numero de celular del que le estan haciendo el envio
      descripcion:
        type: string
        description: Concepto por el cual se realizo el envio
      fecha:
        type: string
        description: Fecha de la transaccion
  AcceptResponse:
    title: Confirmacion solicitud exitosa de aceptar transaccion de recibir
    description: Informacion para confirmar que se realizo correctamente la transaccion de aceptar la trasnferencia de recibir dinero.
    properties:
      id:
        type: string
        description: Numero de identificacion de la accion al aceptar recibir la transaccion.
      autorizacion:
        type: string
        description: Numero de la autorizacion.
      monto:
        type: string
        description: Monto de la transaccion aceptada.
      cuenta:
        type: string
        description: Cuenta destino de la transaccion.
      fecha:
        type: string
        description: Fecha de la transaccion.
      hora:
        type: string
        description: Hora de la transaccion.
      mensaje:
        type: string
        description: Mensaje de la respuesta del servicio.
  RespuestaRechazo:
    title: RespuestaRechazo
    description: Respuesta de rechazo de las transacciones de transfiya.
    properties:
      codigoAutorizacion:
        type: string
        description: Numero de la autorizacion.
      transaccionesRechazadas:
        type: array
        items:
          type: string
      montoRechazado:
        type: string
        description: Sumatoria de los montos de las transacciones rechazadas exitosamente.
      fecha:
        type: string
        description: Fecha de la transaccion.
      hora:
        type: string
        description: Hora de la transaccion.
      mensaje:
        type: string
        description: Mensaje de la respuesta del servicio.
  Rechazo:
    title: Rechazo
    description: Objeto que permite realizar el rechazo de las transacciones en transfiya.
    properties:
      numeroTelefono:
        type: string
        description: numero de telefono del cliente.
      transacciones:
        type: array
        items:
          type: string
  AcceptRequest:
    title: Acceptar solicitud dinero
    description: Objeto que permite realizar operaciones de aceptar recibir dinero por medio de transfiya.
    properties:
      tokenCuenta:
        type: string
        description: Numero de cuenta tokenisado del cliente para aceptar la operacion.
      numeroTelefono:
        type: string
        description: numero de telefono del cliente.
      dispositivo:
        $ref: '#/definitions/Dispositivo'
      transactionsRequest:
