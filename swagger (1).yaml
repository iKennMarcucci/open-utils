swagger: '2.0'
info:
  version: 1.0.0
  title: App Banca Movil Bancamía - Transfiya
  description: "Swagger para la definición de los servicios para el MVP de Banca Móvil de Bancamía."
host: "movilidadedpqa-1968232623.us-east-1.elb.amazonaws.com:6777"
basePath: "/transfiya"
schemes:
  - https
securityDefinitions:
  Bearer:
    description: El token se obtiene tras realizar el login en la aplicación y es utilizado para identificar al usuario a lo largo de todos los servicios de forma inequivoca y segura.
    type: apiKey
    name: Authorization
    in: header
paths:
  /consultaWallet:
    post:
      description: Servicio que permite consultar el wallet si existe en base de datos de transfiya
      operationId: postConsultaWallet
      tags :
        - wallet
      parameters:
        - in: body
          name: celular
          description: Numero de celular del cliente
          schema:
            $ref: '#/definitions/Celular'
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/Estado'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /usuario/signer/v1:
    post:
      description: Servicio que permite registrar los datos del usuario para generar el wallet.
      operationId: generateSigner
      tags:
        - signer
      produces:
        - application/json
      parameters:
        - in: body
          name: usuario
          description: Datos necesarios para registro del cliente para el uso de transfiya.
          schema:
            $ref: '#/definitions/Usuario'
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            type: array
            items:
              $ref: '#/definitions/SignerResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /register-key:
    post:
      description: Servicio que permite registrar los datos del usuario para generar el wallet.
      operationId: registerKey
      tags:
        - breB
      produces:
        - application/json
      parameters:
        - in: body
          name: usuario
          description: Datos necesarios para registro del cliente para el uso de transfiya.
          schema:
            $ref: '#/definitions/RegisterKey'
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
              $ref: '#/definitions/RegisterKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /query-key:
    get:
      description: Servicio que permite listar las transferencias de solicitud de dinero en transfiya
      operationId: queryKey
      tags:
        - breB
      security:
        - Bearer: []
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            type: array
            items:
              $ref: '#/definitions/QueryKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /solicitar:
    post:
      description: Servicio que nos permite solicitar dinero.
      operationId: postSolicitarUsuario
      tags:
        - transfiya
      security:
        - Bearer: []
      produces:
        - application/json
      parameters:
        - in: body
          name: Usuario
          description: Datos solicitados para el servicio
          schema:
            $ref: '#/definitions/DatosUsuario'
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            $ref: '#/definitions/Solicitar'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
  /solicitar/solicitudes:
    get:
      description: Servicio que permite listar las transferencias de solicitud de dinero en transfiya
      operationId: getSolicitudes
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - in: query
          name: celular
          description: Numero de celular encriptado.
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            type: array
            items:
              $ref: '#/definitions/Solicitud'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /solicitar/confirmar:
    post:
      description: Servicio que permite generar una OTP para el debito a través transfiya solicitar.
      operationId: postValidateOtpSolicitud
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - name: debito
          required: true
          description: Informacion para generar OTP para el debito a través de transfiya.
          in: body
          schema:
            $ref: '#/definitions/ConfirmacionSolicitud'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          headers:
            X-PHRASE:
              type: string
              description: Número de la transacción para validar OTP.
            X-MAC:
              type: string
              description: Hash que permite validar la respuest del servicio
          schema:
            $ref: '#/definitions/AcceptResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /solicitar/aceptar:
    post:
      description: Servicio que permite generar una OTP para el debito a través transfiya solicitar.
      operationId: postGenerateOtpSolicitud
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - name: debito
          required: true
          description: Informacion para generar OTP para el debito a través de transfiya.
          in: body
          schema:
            $ref: '#/definitions/AcceptRequest'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          headers:
            X-PHRASE:
              type: string
              description: Número de la transacción para validar OTP.
            X-MAC:
              type: string
              description: Hash que permite validar la respuest del servicio
          schema:
            $ref: '#/definitions/NotificacionOtp'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /solicitar/rechazar:
    post:
      description: Servicio que permite rechazar una o varias solicitudes.
      operationId: postRechazarSolicitud
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - name: RechazoSolicitud
          required: true
          description: Informacion para rechazar una solicitud a través de transfiya.
          in: body
          schema:
            $ref: '#/definitions/Rechazo'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/RespuestaRechazo'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /solicitar/comprobante:
    post:
      description: Obtener reporte de cierre a partir de la cadena cifrada
      operationId: postVoucherSolicitudes
      tags:
        - transfiya
        - reporte
      security:
        - Bearer: []
      parameters:
        - name: datosComprobante
          in: body
          description: "Datos del reporte en formato de cadena"
          required: true
          schema:
            $ref: '#/definitions/DatosComprobante'
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        200:
          description: OK - PDF generado correctamente en base 64
          schema:
            type: string
        404:
          description: No encontrado - No se encontró el registro
          schema:
            $ref: '#/definitions/Error'
        500:
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
  /defaultSignerUser:
    get:
      description: Servicio que permite verificar si el cliente cuenta con un signer por default
      operationId: getSignerDefault
      tags:
        - signer
      security:
        - Bearer: []
      parameters:
        - in: query
          name: celular
          description: Numero de celular encriptado.
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/SignerDefault'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
    put:
      description: Servicio que permite actualizar la cuenta por defecto al cliente.
      operationId: putSignerDefault
      tags:
        - signer
      produces:
        - application/json
      parameters:
        - in: body
          name: cuentaUsuario
          description: Datos que se requieren para la actualización del signer por defecto.
          schema:
            $ref: '#/definitions/CuentaUsuario'
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/SignerResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /credito:
    get:
      description: Servicio que permite recibir las tranferencias rebidas mediante transfiya
      operationId: getCredito
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - in: query
          name: celular
          description: Numero de celular encriptado.
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            type: array
            items:
              $ref: '#/definitions/Credito'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /reception/accept:
    post:
      description: Servicio que permite aceptar recibir dinero.
      operationId: postAcceptReception
      tags:
        - transfiya
      security:
        - Bearer: []
      consumes:
        - application/json
      parameters:
        - name: confirmacionAceptacionTransaccion
          required: true
          description: Informacion para aceptar la recepcion de dinero desde trasnfiya.
          in: body
          schema:
            $ref: '#/definitions/AcceptReceiver'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            $ref: '#/definitions/AcceptResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /reception/reject:
    post:
      description: Servicio que permite rechazar la recepcion las transacciones de transfiya de recibir dinero.
      operationId: postRechazoRecibir
      tags:
        - transfiya
      security:
        - Bearer: [ ]
      consumes:
        - application/json
      parameters:
        - name: RechazoRecibir
          required: true
          description: Informacion para rechazar las transacciones pendientes de recibir.
          in: body
          schema:
            $ref: '#/definitions/Rechazo'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            $ref: '#/definitions/RespuestaRechazo'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /movimientos:
    get:
      description: Servicio que permite generar la lista de movimientos realizados por transfiya.
      operationId: getMovements
      tags:
        - transfiya
      security:
        - Bearer: []
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            type: array
            items:
              $ref: '#/definitions/MovimientoTransfiya'
        '204':
          description: Respuesta en caso de exito si no encuentra ningun movimiento.

        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /debito/otp:
    post:
      description: Servicio que permite generar una OTP para el debito a través transfiya.
      operationId: postGenerateOtpDebit
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - name: debito
          required: true
          description: Informacion para generar OTP para el debito a través de transfiya.
          in: body
          schema:
            $ref: '#/definitions/Debito'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          headers:
            X-PHRASE:
              type: string
              description: Número de la transacción para validar OTP.
            X-MAC:
              type: string
              description: Hash que permite validar la respuest del servicio
          schema:
            $ref: '#/definitions/NotificacionOtp'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /debito:
    post:
      description: Servicio que permite realizar un debito en la cuenta para ser enviado a traves de transfiya.
      operationId: postDebito
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - name: confirmacionDebito
          required: true
          description: datos para realizar el debito
          in: body
          schema:
            $ref: '#/definitions/ConfirmacionDebito'
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito
          schema:
            $ref: '#/definitions/OperacionDebito'
          headers:
            X-MAC:
              type: string
              description: Hash que permite validar la respuest del servicio
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /debito/comprobante:
    get:
      description: Consulta de la constancia y verificacion de los datos al momento de realizar el envio de dinero
      operationId: getVoucherMovement
      tags:
        - transfiya
      security:
        - Bearer: []
      parameters:
        - name: idMovimiento
          type: string
          in: query
          required: true
          description: Identificador del movimiento
      produces:
        - application/json
        - application/pdf
        - application/octet-stream
      responses:
        '200':
          description: Voucher de movimiento en PDF
          schema:
            type: string
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '401':
          description: Respuesta en caso de acceso no autorizado a la operación
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Respuesta en caso de error interno en el servidor
          schema:
            $ref: '#/definitions/Error'
        default:
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /manage-key:
    post:
      description: Servicio que permite actualizar los datos del usuario para generar el wallet.
      operationId: manageKey
      tags:
        - breB
      produces:
        - application/json
      parameters:
        - in: body
          name: manageKey
          description: Datos necesarios para la actualización de llaves para el uso de transfiya.
          schema:
            $ref: '#/definitions/ManageKey'
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/RegisterKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
  /inactive-key:
    post:
      description: Servicio que permite cancelar las llaves del usuario.
      operationId: inactiveKey
      tags:
        - breB
      produces:
        - application/json
      parameters:
        - in: body
          name: inactiveKey
          description: Datos necesarios para la cancelacion de llaves para el uso de transfiya.
          schema:
            $ref: '#/definitions/InactiveKey'
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/RegisterKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'

  /terminosCondiciones:
    get:
      description: Servicio que permite consultar los terminos y condiciones de SPI
      operationId: getTerminosCondiciones
      tags:
        - terminos
      parameters:
        - name: tipoDocumento
          in: query
          description: tipo de documento del cliente a consultar.
          type: string
        - name: numeroDocumento
          in: query
          description: numero de documento del cliente a consultar.
          type: string
        - name: version
          in: query
          description: numero de la versión de la aplicacion.
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Respuesta en caso de exito.
          schema:
            $ref: '#/definitions/TerminosCondiciones'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '412':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
    post:
        description: Servicio que permite consultar el wallet si existe en base de datos de transfiya
        operationId: postTerminosCondiciones
        tags :
          - terminos
        parameters:
          - in: body
            name: consultaTerminos
            description: Actualización de los terminos y condiciones
            schema:
              $ref: '#/definitions/TerminosRequest'
        responses:
          '200':
            description: Respuesta en caso de exito.
            schema:
              $ref: '#/definitions/ResponseTerminos'
          '400':
            description: Respuesta en caso de error
            schema:
              $ref: '#/definitions/Error'
          '412':
            description: No se cumple con las condiciones minimas del servicio
            schema:
              $ref: '#/definitions/Error'
          '500':
            description: Error inesperado
            schema:
              $ref: '#/definitions/Error'
  /register-key-mid:
    post:
      operationId: post-register-key-mid
      summary: Create New Key
      tags:
        - breB
      parameters:
        - in: body
          name: Register Key MID
          description: Datos necesarios para registro del cliente para el uso de transfiya.
          required: true
          schema:
            type: object
            title: RegisterKeyMidRequest
            required:
              - nameEnterprise
              - name
              - lastName
              - phone
              - bankAccountType
              - tokenAccountNumber
              - email
            properties:
              nameEnterprise:
                type: string
                minLength: 2
                maxLength: 50
                example: TecnoNova Solutions
                description: Nombre de la empresa, acepta números y letras, no acepta carácteres especiales.
              name:
                type: string
                minLength: 2
                maxLength: 50
                example: Olga
                description: Nombre de la persona, acepta números y letras, no acepta carácteres especiales.
              lastName:
                type: string
                minLength: 2
                maxLength: 50
                example: Rodrigez
                description: Apellido de la persona, acepta números y letras, no acepta carácteres especiales.
              phone:
                type: string
                maxLength: 10
                example: 3226159752
                description: Numero de celular de la persona, acepta números, no acepta carácteres especiales.
              bankAccountType:
                type: string
                example: CAHO
                description: Tipo de la cuenta en bancamia
              tokenAccountNumber:
                type: string
                maxLength: 34
                example: 9002345678
                description: Numero de cuenta bancaria del usuario.
              email:
                type: string
                description: "Email asociado a la llave con formato RFC5321/5322"
                format: "RFC5321/5322"
                example: micorreo@midominio.com
              personType:
                type: string
                minLength: 2
                maxLength: 50
                example: PERSON
                description: "Se relaciona a el tipo de llave person o business."
              device:
                $ref: '#/definitions/Dispositivo'
      responses:
        '200':
          description: OK - Llave creada correctamente
          schema:
            $ref: '#/definitions/RegisterKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
  /update-key-mid:
    put:
      operationId: put-update-key-mid
      summary: Update Key Mid
      tags:
        - breB
      parameters:
        - in: body
          name: updateKeyMid
          description: Datos necesarios para registro del cliente para el uso de transfiya.
          required: true
          schema:
            title: UpdateKeyMidRequest
            type: object
            required:
              - bankAccountType
              - tokenAccountNumber
              - key
            properties:
              bankAccountType:
                type: string
                description: >-
                  Tipo del medio de pago asociado a la llave
                example: Cuentamia
              tokenAccountNumber:
                title: AccountNo
                description: >-
                  Identificación numérica única de la cuenta que se asociará a la llave
                type: string
                example: 230040122345
                maxLength: 34
              key:
                title: Llave Merchant ID
                description: valor de la llave merchant id
                type: string
                maxLength: 10
                minLength: 10
                example: 0010255689
              device:
                $ref: '#/definitions/Dispositivo'
      responses:
        '200':
          description: OK - Comercio Registrado o Actualizado
          schema:
            $ref: '#/definitions/RegisterKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
