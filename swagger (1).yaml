    post:
      operationId: post-cancel-key-mid
      summary: Cancel key Mid
      tags:
        - breB
      parameters:
        - in: body
          name: CancelkeyRequest
          description: Datos para la actualización de la clave.
          required: true
          schema:
            title: CancelKeyMidRequest
            type: object
            required:
              - key
            properties:
              key:
                title: Llave Merchant ID
                description: valor de la llave merchant id
                example: '0010555689'
                type: string
                maxLength: 10
                minLength: 10
              device:
                $ref: '#/definitions/Dispositivo'
      responses:
        '200':
          description: OK - Comercio Registrado o Actualizado
          schema:
            $ref: '#/definitions/RegisterKeyResponse'
        '400':
          description: Respuesta en caso de error
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: No se cumple con las condiciones minimas del servicio
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Error inesperado
          schema:
            $ref: '#/definitions/Error'
